<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qiming Archive System</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(20, 36, 30, 0.03) 1px, transparent 1px) 0 0 / 32px 32px,
          linear-gradient(rgba(20, 36, 30, 0.03) 1px, transparent 1px) 0 0 / 32px 32px,
          linear-gradient(180deg, #f8f3e6 0%, #efe5d3 100%);
        color: #14241e;
        font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
      }

      .boot-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .boot-card {
        width: min(640px, 100%);
        padding: 28px;
        border-radius: 24px;
        border: 1px solid rgba(20, 36, 30, 0.14);
        background: rgba(255, 251, 242, 0.92);
        box-shadow: 0 20px 60px rgba(38, 46, 38, 0.14);
      }

      .boot-card small {
        display: inline-block;
        margin-bottom: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #41544b;
      }

      .boot-card h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 4vw, 40px);
        font-family: Georgia, "Times New Roman", serif;
      }

      .boot-card p {
        margin: 0;
        line-height: 1.75;
        color: #41544b;
      }
    </style>
    <script>
      window.__geniusBootFail = function (message) {
        const root = document.getElementById('root');
        if (!root || root.dataset.bootState === 'mounted') {
          return;
        }

        root.innerHTML =
          '<div class="boot-shell">' +
          '<div class="boot-card">' +
          '<small>QIMING ARCHIVE TERMINAL</small>' +
          '<h1>Page failed to load</h1>' +
          '<p>' +
          (message || 'The page did not boot. Reopen the standalone HTML or reload this page.') +
          '</p>' +
          '</div>' +
          '</div>';
      };

      window.addEventListener('error', function (event) {
        const message = event && event.message ? event.message : 'A script resource failed to load.';
        window.__geniusBootFail(message);
      });

      window.addEventListener('unhandledrejection', function (event) {
        const reason = event && event.reason;
        const message = reason && reason.message ? reason.message : 'An unhandled startup error occurred.';
        window.__geniusBootFail(message);
      });

      window.addEventListener('DOMContentLoaded', function () {
        window.setTimeout(function () {
          const root = document.getElementById('root');
          if (root && root.dataset.bootState !== 'mounted') {
            window.__geniusBootFail('The page is still waiting to boot. Please reopen the standalone HTML and try again.');
          }
        }, 4000);
      });
    </script>
    <script type="module" crossorigin src="./assets/index-Z0tU2wZ3.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-C3ruFVHx.css">
  </head>
  <body>
    <div id="root" data-boot-state="booting">
      <div class="boot-shell">
        <div class="boot-card">
          <small>QIMING ARCHIVE TERMINAL</small>
          <h1>Loading Qiming Archive System</h1>
          <p>The first launch can take a few seconds. If nothing changes, press Ctrl+F5 to reload.</p>
        </div>
      </div>
    </div>
    <noscript>This page needs JavaScript to run.</noscript>
  </body>
</html>
